<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visualizador de Dados SaidJur</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/static/styles.css" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: { DEFAULT: '#1d4ed8', light: '#3b82f6', dark: '#1e3a8a' } }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">
<div x-data="app()" x-init="iniciar()" class="flex flex-col min-h-screen">

  <header class="bg-primary shadow-md sticky top-0 z-40">
    <div class="max-w-screen-2xl mx-auto px-4 py-3 flex flex-col sm:flex-row items-center gap-3">
      <div class="flex items-center gap-2 shrink-0">
        <span class="text-2xl">📊</span>
        <h1 class="text-white font-bold text-lg leading-tight">
          Visualizador de Dados<br>
          <span class="font-normal text-blue-200 text-sm" x-text="nomeBanco || 'SaidJur'"></span>
        </h1>
      </div>

      <div class="flex-1 w-full max-w-2xl">
        <form @submit.prevent="buscarGlobal()" class="flex gap-2">
          <input type="search" x-model="termoBusca" placeholder="🔍 Pesquisar em todo o banco de dados..." class="w-full px-4 py-2 rounded-lg border-0 shadow text-gray-800 focus:ring-2 focus:ring-blue-300 focus:outline-none text-base" />
          <button type="submit" :disabled="buscandoGlobal" class="bg-blue-500 hover:bg-blue-400 text-white px-4 py-2 rounded-lg font-semibold shadow transition disabled:opacity-60">Buscar</button>
          <button type="button" x-show="buscandoGlobal" @click="cancelarBuscaGlobal()" class="bg-red-500 hover:bg-red-400 text-white px-3 py-2 rounded-lg text-sm">Cancelar</button>
        </form>
      </div>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden max-w-screen-2xl mx-auto w-full">
    <aside class="w-80 shrink-0 bg-white border-r border-gray-200 flex flex-col overflow-hidden">
      <div class="p-3 border-b space-y-2">
        <div class="flex gap-2">
          <button @click="abaAtiva='dados'" class="px-3 py-1.5 rounded text-sm font-semibold" :class="abaAtiva==='dados' ? 'bg-blue-100 text-primary' : 'bg-gray-100 text-gray-600'">📋 Dados</button>
          <button @click="abaAtiva='sql'" class="px-3 py-1.5 rounded text-sm font-semibold" :class="abaAtiva==='sql' ? 'bg-blue-100 text-primary' : 'bg-gray-100 text-gray-600'">💻 SQL</button>
        </div>
        <input type="search" x-model="filtroTabela" placeholder="🔎 Filtrar tabelas..." class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none" />
      </div>

      <div class="overflow-y-auto flex-1 py-1" x-show="abaAtiva==='dados'">
        <template x-if="tabelasFavoritas.length > 0">
          <div class="mb-2">
            <p class="px-3 py-1 text-xs font-bold text-amber-600">⭐ Favoritos</p>
            <template x-for="tabela in tabelasFavoritas" :key="'fav-'+tabela.nome">
              <div class="flex items-center px-2">
                <button @click="selecionarTabela(tabela.nome)" class="flex-1 text-left px-2 py-1.5 text-sm hover:bg-blue-50 rounded" :class="tabelaSelecionada===tabela.nome ? 'bg-blue-50 text-primary font-semibold' : ''">
                  <span x-text="tabela.nome"></span>
                </button>
                <button @click.stop="alternarFavorito(tabela.nome)" class="text-amber-500">★</button>
              </div>
            </template>
          </div>
        </template>

        <template x-if="tabelasRecentes.length > 0">
          <div class="mb-2">
            <p class="px-3 py-1 text-xs font-bold text-indigo-600">🕒 Recentes</p>
            <template x-for="tabela in tabelasRecentes" :key="'rec-'+tabela.nome">
              <button @click="selecionarTabela(tabela.nome)" class="w-full text-left px-4 py-1.5 text-sm hover:bg-blue-50" x-text="tabela.nome"></button>
            </template>
          </div>
        </template>

        <p class="px-3 py-1 text-xs font-bold text-gray-500">📚 Todas as tabelas</p>
        <template x-if="carregandoTabelas">
          <div class="px-4 py-2 space-y-2"><template x-for="i in 8"><div class="h-8 bg-gray-200 rounded animate-pulse"></div></template></div>
        </template>

        <template x-if="!carregandoTabelas && tabelasFiltradas.length > 0">
          <ul>
            <template x-for="tabela in tabelasFiltradas" :key="tabela.nome">
              <li class="flex items-center px-2">
                <button @click="selecionarTabela(tabela.nome)" class="flex-1 text-left px-2 py-2 text-sm hover:bg-blue-50 transition border-l-4" :class="tabelaSelecionada===tabela.nome ? 'border-primary bg-blue-50 text-primary font-semibold' : 'border-transparent text-gray-700'">
                  <span x-text="tabela.nome"></span>
                  <span class="text-xs text-gray-400 block" x-text="formatarNumero(tabela.linhas_aprox) + ' registros · ' + tabela.tamanho_mb + ' MB'"></span>
                </button>
                <button @click.stop="alternarFavorito(tabela.nome)" class="px-1 text-lg" :class="ehFavorito(tabela.nome) ? 'text-amber-500' : 'text-gray-300 hover:text-amber-500'">★</button>
              </li>
            </template>
          </ul>
        </template>
      </div>

      <div class="overflow-y-auto flex-1 p-3" x-show="abaAtiva==='sql'">
        <h3 class="font-semibold text-gray-700 mb-2">💻 Console SQL</h3>
        <p class="text-xs text-gray-500 mb-2">Apenas <strong>SELECT/WITH</strong> (máx 5000 linhas)</p>
        <textarea x-model="sqlQuery" class="w-full h-40 font-mono text-xs border rounded p-2" placeholder="SELECT * FROM tabela LIMIT 100"></textarea>
        <button @click="executarSql()" :disabled="sqlCarregando" class="mt-2 w-full bg-primary text-white rounded py-2 font-semibold hover:bg-blue-700">Executar</button>

        <div class="mt-4" x-show="sqlHistorico.length > 0">
          <p class="text-xs font-semibold text-gray-500 mb-1">Últimas queries</p>
          <div class="space-y-1 max-h-40 overflow-auto">
            <template x-for="q in sqlHistorico" :key="q">
              <button @click="usarQueryHistorico(q)" class="w-full text-left text-xs px-2 py-1 rounded bg-gray-100 hover:bg-gray-200 truncate" :title="q" x-text="q"></button>
            </template>
          </div>
        </div>
      </div>
    </aside>

    <main class="flex-1 overflow-hidden flex flex-col min-h-0">
      <template x-if="mostrarBusca">
        <div class="flex flex-col h-full min-h-0">
          <div class="p-4 pb-3 space-y-4 bg-gray-50 border-b shrink-0">
            <div class="flex items-center justify-between">
              <h2 class="text-lg font-semibold">Resultados para "<span class="text-primary" x-text="termoBuscaAtiva"></span>"</h2>
              <button @click="fecharBusca()" class="bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded text-sm font-semibold">Fechar busca</button>
            </div>

            <template x-if="buscaCancelada">
              <div class="bg-amber-50 border border-amber-300 rounded p-3 flex flex-wrap items-center gap-3">
                <span class="text-amber-800 font-semibold text-sm"><span aria-hidden="true">🛑</span> Busca cancelada. <span x-text="buscaProgresso.encontrados"></span> resultado(s) parcial(is) exibido(s) abaixo.</span>
                <div class="flex gap-2 ml-auto">
                  <button @click="reiniciarBusca()" class="bg-primary text-white px-3 py-1 rounded text-sm font-semibold hover:bg-blue-700">Buscar novamente</button>
                  <button @click="fecharBusca()" class="bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded text-sm font-semibold">Fechar busca</button>
                </div>
              </div>
            </template>

            <template x-if="!buscaCancelada">
              <div class="bg-white border rounded p-3 text-sm">
                <p class="text-gray-600" x-text="`Buscando em ${buscaProgresso.processadas}/${buscaProgresso.total} tabelas...`"></p>
                <div class="w-full bg-gray-200 h-2 rounded mt-2 overflow-hidden">
                  <div class="bg-blue-500 h-full" :style="`width: ${buscaProgresso.total ? (buscaProgresso.processadas * 100 / buscaProgresso.total) : 0}%`"></div>
                </div>
                <p class="text-xs text-gray-500 mt-1" x-text="`${buscaProgresso.encontrados} grupo(s) encontrado(s)`"></p>
              </div>
            </template>
          </div>

          <div class="flex-1 overflow-auto p-4 min-h-0">
            <div class="space-y-4">
              <template x-for="grupo in resultadosBusca" :key="grupo.tabela + grupo.coluna + Math.random()">
                <div class="bg-white rounded-lg shadow-sm border overflow-hidden">
                  <div class="px-4 py-2 bg-gray-50 border-b flex items-center gap-2">
                    <span class="font-semibold text-primary" x-text="grupo.tabela"></span>
                    <span class="text-gray-400">→</span>
                    <span class="font-medium text-gray-700" x-text="grupo.coluna"></span>
                    <span class="ml-auto text-xs text-gray-400" x-text="grupo.registros.length + ' resultado(s)'"></span>
                  </div>
                  <div class="overflow-x-auto max-h-64">
                    <table class="min-w-max text-sm">
                      <thead class="bg-gray-100 sticky top-0"><tr><template x-for="col in Object.keys(grupo.registros[0] || {})" :key="col"><th class="px-3 py-2 text-left" x-text="col"></th></template></tr></thead>
                      <tbody>
                        <template x-for="(linha, idx) in grupo.registros" :key="idx">
                          <tr :class="idx % 2 === 0 ? 'bg-white' : 'bg-gray-50'"><template x-for="col in Object.keys(linha)" :key="col"><td class="px-3 py-1.5 max-w-xs truncate" :title="exibirValor(grupo.tabela, col, linha[col])" x-text="exibirValor(grupo.tabela, col, linha[col])"></td></template></tr>
                        </template>
                      </tbody>
                    </table>
                  </div>
                </div>
              </template>
              <template x-if="!buscandoGlobal && !buscaCancelada && resultadosBusca.length===0"><p class="text-gray-500">Nenhum resultado encontrado.</p></template>
            </div>
          </div>
        </div>
      </template>

      <template x-if="!mostrarBusca && abaAtiva==='dados' && !tabelaSelecionada">
        <div class="flex-1 overflow-auto min-h-0 p-6 space-y-6">
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-4" x-show="dashboard">
            <div class="bg-white border rounded p-4"><p class="text-xs text-gray-500">Total de tabelas</p><p class="text-2xl font-bold" x-text="formatarNumero(dashboard?.estatisticas?.total_tabelas)"></p></div>
            <div class="bg-white border rounded p-4"><p class="text-xs text-gray-500">Total de registros</p><p class="text-2xl font-bold" x-text="formatarNumero(dashboard?.estatisticas?.total_registros)"></p></div>
            <div class="bg-white border rounded p-4"><p class="text-xs text-gray-500">Tamanho total (MB)</p><p class="text-2xl font-bold" x-text="formatarNumero(dashboard?.estatisticas?.tamanho_total_mb)"></p></div>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <div class="bg-white border rounded p-4">
              <h3 class="font-semibold mb-2">📊 10 maiores tabelas</h3>
              <div class="space-y-2" x-show="dashboard?.maiores_tabelas?.length">
                <template x-for="t in dashboard?.maiores_tabelas || []" :key="t.nome">
                  <button @click="selecionarTabela(t.nome)" class="w-full text-left px-3 py-2 rounded hover:bg-blue-50 border text-sm flex justify-between">
                    <span x-text="t.nome"></span><span class="text-gray-500" x-text="formatarNumero(t.linhas_aprox)"></span>
                  </button>
                </template>
              </div>
            </div>

            <div class="bg-white border rounded p-4">
              <h3 class="font-semibold mb-2">🔎 Busca em destaque</h3>
              <p class="text-sm text-gray-600 mb-2">Sugestões rápidas:</p>
              <div class="flex flex-wrap gap-2">
                <button @click="termoBusca='ATIVO'; buscarGlobal()" class="px-2 py-1 bg-gray-100 rounded text-sm">ATIVO</button>
                <button @click="termoBusca='publicação'; buscarGlobal()" class="px-2 py-1 bg-gray-100 rounded text-sm">publicação</button>
                <button @click="termoBusca='2024'; buscarGlobal()" class="px-2 py-1 bg-gray-100 rounded text-sm">2024</button>
              </div>
            </div>
          </div>
        </div>
      </template>

      <template x-if="!mostrarBusca && abaAtiva==='sql'">
        <div class="flex flex-col h-full min-h-0">
          <div class="p-4 pb-3 border-b bg-white shrink-0">
            <h2 class="font-semibold text-lg">Resultado SQL</h2>
          </div>
          <div class="flex-1 min-h-0 flex flex-col p-4">
            <template x-if="sqlCarregando"><div class="h-16 bg-gray-200 rounded animate-pulse"></div></template>
            <template x-if="!sqlCarregando && sqlResultado">
              <div class="flex flex-col flex-1 min-h-0 space-y-2">
                <p class="text-sm text-gray-500 shrink-0" x-text="`${formatarNumero(sqlResultado.total)} linha(s) retornada(s)`"></p>
                <div class="flex-1 min-h-0 overflow-auto border rounded">
                <table class="min-w-max text-sm">
                  <thead class="bg-gray-100"><tr><template x-for="col in sqlResultado.colunas" :key="col"><th class="px-3 py-2 text-left" x-text="col"></th></template></tr></thead>
                  <tbody>
                    <template x-for="(linha, idx) in sqlLinhasPaginadas" :key="idx">
                      <tr :class="idx%2===0 ? 'bg-white' : 'bg-gray-50'"><template x-for="col in sqlResultado.colunas" :key="col"><td class="px-3 py-1.5 max-w-xs truncate" :title="exibirValor(sqlTabelaContexto, col, linha[col])" x-text="exibirValor(sqlTabelaContexto, col, linha[col])"></td></template></tr>
                    </template>
                  </tbody>
                </table>
                </div>
                <div class="bg-white border rounded px-4 py-2 flex items-center justify-between gap-2 text-sm shrink-0">
                  <span class="text-gray-600">Página <strong x-text="sqlPagina"></strong> de <strong x-text="sqlTotalPaginas"></strong></span>
                  <div class="flex items-center gap-2">
                    <button @click="irPaginaSql(-1)" :disabled="sqlPagina<=1" class="px-3 py-1 border rounded disabled:opacity-40">◀ Anterior</button>
                    <button @click="irPaginaSql(1)" :disabled="sqlPagina>=sqlTotalPaginas" class="px-3 py-1 border rounded disabled:opacity-40">Próxima ▶</button>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </div>
      </template>

      <template x-if="!mostrarBusca && abaAtiva==='dados' && tabelaSelecionada">
        <div class="flex flex-col h-full min-h-0">
          <div class="bg-white border-b px-4 py-2 flex flex-wrap items-center gap-2 shrink-0">
            <h2 class="font-bold text-primary text-base">📋 <span x-text="tabelaSelecionada"></span></h2>
            <span class="text-gray-400 text-sm" x-text="'(' + formatarNumero(totalRegistros) + ' registros)'"></span>
            <span class="text-gray-400 text-xs">· página <strong x-text="pagina"></strong> de <strong x-text="formatarNumero(totalPaginas)"></strong></span>

            <template x-for="(filtro, col) in filtrosAtivos" :key="col">
              <span class="inline-flex items-center gap-1 bg-blue-100 text-blue-800 text-xs px-2 py-0.5 rounded-full"><span x-text="col + ': ' + filtro.valor"></span><button @click="removerFiltro(col)" class="ml-1 hover:text-red-600">✕</button></span>
            </template>
            <button x-show="Object.keys(filtrosAtivos).length > 0" @click="limparFiltros()" class="text-xs text-red-500 hover:underline">Limpar filtros</button>

            <div class="relative ml-2">
              <button @click="popoverColunasAberto = !popoverColunasAberto" class="text-sm border rounded px-2 py-1 hover:bg-gray-50">🎛️ Colunas</button>
              <div x-show="popoverColunasAberto" @click.outside="popoverColunasAberto=false" class="absolute z-40 mt-1 bg-white border rounded shadow p-3 w-72 max-h-72 overflow-auto">
                <template x-for="col in colunas" :key="'colvis-'+col.nome">
                  <label class="flex items-center gap-2 text-sm py-1"><input type="checkbox" :checked="colunasVisiveis[col.nome] !== false" @change="alternarColunaVisivel(col.nome)" /><span x-text="col.nome"></span></label>
                </template>
              </div>
            </div>

            <button @click="alternarMostrarLabels()" class="text-sm border rounded px-2 py-1 hover:bg-gray-50" :aria-label="mostrarLabels ? 'Mostrar apenas IDs' : 'Mostrar nomes das referências'" :title="mostrarLabels ? 'Clique para mostrar apenas IDs' : 'Clique para mostrar nomes'" x-text="mostrarLabels ? '🏷️ Mostrar IDs' : '🏷️ Mostrar nomes'"></button>

            <div class="ml-auto flex gap-2">
              <a :href="urlExportar('csv')" class="inline-flex items-center gap-1 bg-green-600 hover:bg-green-500 text-white px-3 py-1.5 rounded-lg text-sm font-semibold">📥 CSV</a>
              <a :href="urlExportar('xlsx')" class="inline-flex items-center gap-1 bg-emerald-700 hover:bg-emerald-600 text-white px-3 py-1.5 rounded-lg text-sm font-semibold">📥 Excel</a>
            </div>
          </div>

          <div class="flex-1 overflow-auto min-h-0">
            <template x-if="carregandoDados"><div class="p-4 space-y-2"><div class="h-8 bg-gray-200 rounded animate-pulse w-full"></div><template x-for="i in 10"><div class="h-7 bg-gray-100 rounded animate-pulse w-full"></div></template></div></template>
            <template x-if="!carregandoDados && linhas.length > 0">
              <table class="min-w-max text-sm border-collapse">
                <thead class="bg-gray-100 sticky top-0 z-20 shadow-sm">
                  <tr>
                    <template x-for="col in colunasExibidas" :key="col.nome">
                      <th class="px-3 py-2 text-left font-semibold text-gray-600 whitespace-nowrap border-b border-gray-200 group">
                        <div class="flex items-center gap-1">
                          <button @click="ordenarPor(col.nome)" class="hover:text-primary flex items-center gap-1">
                            <span x-text="col.nome"></span>
                            <span x-show="ordenarColuna === col.nome && direcaoOrdem === 'asc'">▲</span>
                            <span x-show="ordenarColuna === col.nome && direcaoOrdem === 'desc'">▼</span>
                          </button>
                          <div class="relative">
                            <button @click.stop="abrirFiltro(col.nome)" :class="filtrosAtivos[col.nome] ? 'text-primary' : 'text-gray-300 opacity-0 group-hover:opacity-100'" class="hover:text-primary transition text-xs px-0.5" title="Filtrar">🔽</button>
                            <div x-show="filtroAberto === col.nome" @click.outside="filtroAberto = null" class="absolute left-0 top-7 z-50 bg-white border rounded-lg shadow-xl p-3 w-60">
                              <p class="text-xs font-semibold text-gray-500 mb-2" x-text="'Filtrar: ' + col.nome"></p>
                              <select x-model="filtroTemp.op" class="w-full border rounded px-2 py-1 text-sm mb-2">
                                <option value="contem">Contém</option><option value="igual">É igual a</option><option value="diferente">É diferente de</option><option value="comeca_com">Começa com</option><option value="maior">Maior que</option><option value="menor">Menor que</option>
                              </select>
                              <input type="text" x-model="filtroTemp.valor" @keyup.enter="aplicarFiltro(col.nome)" class="w-full border rounded px-2 py-1 text-sm mb-2" />
                              <div class="flex gap-2"><button @click="aplicarFiltro(col.nome)" class="flex-1 bg-primary text-white rounded px-2 py-1 text-xs">Aplicar</button><button @click="filtroAberto = null" class="flex-1 border rounded px-2 py-1 text-xs">Cancelar</button></div>
                            </div>
                          </div>

                          <div class="relative">
                            <button @click.stop="abrirStatsColuna(col.nome)" class="text-xs text-gray-400 hover:text-primary" title="Estatísticas">📊</button>
                            <div x-show="statsAbertoColuna === col.nome" @click.outside="statsAbertoColuna=null" class="absolute left-0 top-7 z-50 bg-white border rounded-lg shadow-xl p-3 w-72 text-xs space-y-1">
                              <template x-if="carregandoStats"><p>Carregando estatísticas...</p></template>
                              <template x-if="!carregandoStats && statsColuna">
                                <div>
                                  <p>Não nulos: <strong x-text="formatarNumero(statsColuna.nao_nulos)"></strong></p>
                                  <p>Distintos: <strong x-text="formatarNumero(statsColuna.distintos)"></strong></p>
                                  <p>Mínimo: <strong x-text="statsColuna.minimo ?? '—'"></strong></p>
                                  <p>Máximo: <strong x-text="statsColuna.maximo ?? '—'"></strong></p>
                                  <p x-show="statsColuna.amostrado" class="text-amber-600">(Amostrado por volume alto)</p>
                                  <p class="font-semibold mt-1">Top 5:</p>
                                  <template x-for="item in statsColuna.top_5" :key="item.valor + '-' + item.quantidade"><p class="truncate" x-text="`${item.valor} (${item.quantidade})`"></p></template>
                                </div>
                              </template>
                            </div>
                          </div>
                        </div>
                        <div class="text-[11px] text-gray-400" x-text="col.tipo"></div>
                      </th>
                    </template>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="(linha, idx) in linhas" :key="idx">
                    <tr :class="idx % 2 === 0 ? 'bg-white' : 'bg-gray-50'" class="hover:bg-blue-50 transition cursor-pointer" @click="abrirDetalheIndice(idx)">
                      <template x-for="col in colunasExibidas" :key="col.nome">
                        <td class="px-3 py-1.5 text-gray-700 max-w-xs truncate border-b border-gray-100" :title="exibirValor(tabelaSelecionada, col.nome, linha[col.nome])">
                          <template x-if="ehFkValido(col.nome, linha[col.nome])">
                            <span>
                              <button @click="abrirFk($event, tabelaSelecionada, col.nome, linha[col.nome])" class="text-primary underline" :title="`${col.nome} → ${fkAtualOuInferida(col.nome)?.tabela_referenciada}.${fkAtualOuInferida(col.nome)?.coluna_referenciada}`" x-text="exibirComLabel(tabelaSelecionada, col.nome, linha[col.nome])"></button>
                              <template x-if="mostrarLabels && descricaoHumana(tabelaSelecionada, col.nome, linha[col.nome])">
                                <span class="text-gray-400 text-xs ml-1" x-text="'(' + linha[col.nome] + ')'"></span>
                              </template>
                            </span>
                          </template>
                          <template x-if="!ehFkValido(col.nome, linha[col.nome])"><span x-text="exibirValor(tabelaSelecionada, col.nome, linha[col.nome])"></span></template>
                        </td>
                      </template>
                    </tr>
                  </template>
                </tbody>
              </table>
            </template>

            <template x-if="!carregandoDados && linhas.length === 0"><div class="flex flex-col items-center justify-center h-full py-16 text-gray-400"><div class="text-5xl mb-3">🗃️</div><p class="text-lg">Nenhum registro encontrado.</p></div></template>
          </div>

          <div class="bg-white border-t px-4 py-2 flex flex-wrap items-center justify-between gap-2 text-sm sticky bottom-0 z-10">
            <div class="flex items-center gap-2"><span class="text-gray-500">Mostrar</span><select x-model.number="porPagina" @change="pagina = 1; carregarDados()" class="border rounded px-2 py-1 text-sm"><option value="25">25</option><option value="50">50</option><option value="100">100</option><option value="200">200</option><option value="500">500</option></select><span class="text-gray-500">por página</span></div>
            <div class="flex items-center gap-2"><button @click="irPagina(pagina - 1)" :disabled="pagina <= 1" class="px-3 py-1 border rounded hover:bg-gray-100 disabled:opacity-40">◀ Anterior</button><span class="text-gray-600">Página <strong x-text="formatarNumero(pagina)"></strong> de <strong x-text="formatarNumero(totalPaginas)"></strong></span><button @click="irPagina(pagina + 1)" :disabled="pagina >= totalPaginas" class="px-3 py-1 border rounded hover:bg-gray-100 disabled:opacity-40">Próxima ▶</button></div>
          </div>
        </div>
      </template>
    </main>
  </div>

  <div x-show="detalheAberto" x-transition class="fixed inset-0 bg-black/40 z-50 flex justify-end" @click.self="fecharDetalhe()">
    <div class="w-full max-w-2xl h-full bg-white shadow-xl flex flex-col">
      <div class="p-4 border-b flex items-center gap-2">
        <h3 class="font-semibold text-lg">Detalhe do registro</h3>
        <span class="text-sm text-gray-500" x-text="detalheTabela"></span>
        <div class="ml-auto flex gap-2">
          <button @click="navegarDetalhe(-1)" class="px-2 py-1 border rounded">←</button>
          <button @click="navegarDetalhe(1)" class="px-2 py-1 border rounded">→</button>
          <button @click="fecharDetalhe()" class="px-2 py-1 border rounded">Fechar</button>
        </div>
      </div>
      <div class="p-4 overflow-auto space-y-3" x-ref="modalDetalhe">
        <template x-for="campo in detalheCampos" :key="campo.nome">
          <div class="border rounded p-3">
            <div class="flex items-center gap-2 mb-2">
              <p class="text-sm font-semibold text-gray-700" x-text="campo.nome"></p>
              <template x-if="fkDeTabela(detalheTabela, campo.nome) || fkInferidaDeTabela(detalheTabela, campo.nome)">
                <span>
                  <button @click="abrirFk($event, detalheTabela, campo.nome, campo.valor)" class="text-xs text-primary underline" :title="`${campo.nome} → ${(fkDeTabela(detalheTabela, campo.nome) || fkInferidaDeTabela(detalheTabela, campo.nome))?.tabela_referenciada}.${(fkDeTabela(detalheTabela, campo.nome) || fkInferidaDeTabela(detalheTabela, campo.nome))?.coluna_referenciada}`">Abrir referência</button>
                  <template x-if="mostrarLabels && labelParaValor((fkDeTabela(detalheTabela, campo.nome) || fkInferidaDeTabela(detalheTabela, campo.nome))?.tabela_referenciada, campo.valor)">
                    <span class="text-xs text-gray-500 ml-1" x-text="'→ ' + labelParaValor((fkDeTabela(detalheTabela, campo.nome) || fkInferidaDeTabela(detalheTabela, campo.nome))?.tabela_referenciada, campo.valor)"></span>
                  </template>
                </span>
              </template>
              <button @click="copiarValor(campo.valor)" class="ml-auto text-xs border rounded px-2 py-1">Copiar valor</button>
            </div>

            <template x-if="ehUrl(valorTexto(campo.valor))">
              <a :href="valorTexto(campo.valor)" target="_blank" rel="noopener" class="text-primary underline break-all" x-text="valorTexto(campo.valor)"></a>
            </template>
            <template x-if="!ehUrl(valorTexto(campo.valor))">
              <pre class="bg-gray-50 rounded p-2 text-xs overflow-auto"><code :class="classeCodigo(campo.valor)" x-text="valorDetalhe(detalheTabela, campo.nome, campo.valor)"></code></pre>
            </template>
          </div>
        </template>
      </div>
    </div>
  </div>

  <div x-show="mensagemErro" x-transition class="fixed bottom-4 right-4 bg-red-600 text-white px-4 py-3 rounded-lg shadow-lg z-50 max-w-sm flex items-start gap-2">
    <span class="text-xl">⚠️</span>
    <div><p class="font-semibold text-sm">Ocorreu um erro</p><p class="text-xs mt-0.5" x-text="mensagemErro"></p></div>
    <button @click="mensagemErro = null" class="ml-2 text-red-200 hover:text-white">✕</button>
  </div>

</div>
<script src="/static/app.js"></script>
</body>
</html>
