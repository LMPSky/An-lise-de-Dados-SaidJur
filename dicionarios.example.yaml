# Dicionário de tradução de ENUMs e códigos curtos.
# Copie este arquivo para dicionarios.yaml e ajuste os significados conforme
# a sua base e a nomenclatura usada internamente.
#
# Estrutura: tabela > coluna > codigo: "Significado humano"
#
# O servidor relê o arquivo automaticamente quando ele muda.
# Não é necessário reiniciar — apenas recarregue a página (Ctrl+Shift+R).

publicationxml:
  nature:
    p: "Publicação XML"
    m: "Publicação Manual"
    api: "Publicação Webjur (API)"
    api_int: "Intimação Webjur (API)"
    aut: "Publicação Automática"
    # Códigos abaixo são antigos/desatualizados (mantidos para compatibilidade):
    i: "Intimação"
    a: "Audiência"
    j: "Julgamento"
    ag: "Agendamento"
    cron: "Tarefa Agendada"
    av: "Aviso"

  aut_event:
    h: "Habilitação"
    l: "Liminar"
    # Nota: aut_event representa a lógica de negócio de prazos automáticos.
    # Para detalhes completos, consulte o corpo do prazo gerado.

  cpfl_spreadsheet_import:
    "0": "Não"
    "1": "Sim"
